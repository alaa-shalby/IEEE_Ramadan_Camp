<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Premium Predictor</title>
    <style>
        /* CSS Direct Integration */
        :root {
            --bg-color: #0f0c29;
            --container-bg: #1b1b2f;
            --accent-color: #8e44ad;
            --text-color: #ffffff;
            --input-bg: #2d3436;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(142, 68, 173, 0.4);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #8e44ad, #c0392b);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            transition: transform 0.2s, opacity 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(142, 68, 173, 0.1);
            border-radius: 10px;
            border: 1px dashed var(--accent-color);
            text-align: center;
            display: none; /* Hidden by default */
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box h3 {
            margin: 0;
            font-size: 1rem;
            color: #bdc3c7;
        }

        #predictionText {
            font-size: 2rem;
            margin: 10px 0 0 0;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Insurance AI</h2>
        <form id="predictionForm">
            <div class="input-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="e.g. 25" required>
            </div>

            <div class="input-group">
                <label>Sex</label>
                <select name="sex" required>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>BMI (Body Mass Index)</label>
                <input type="number" step="0.1" name="bmi" placeholder="e.g. 22.5" required>
            </div>

            <div class="input-group">
                <label>Number of Children</label>
                <input type="number" name="children" placeholder="0" required>
            </div>

            <div class="input-group">
                <label>Smoker</label>
                <select name="smoker" required>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Region</label>
                <select name="region" required>
                    <option value="southwest">Southwest</option>
                    <option value="southeast">Southeast</option>
                    <option value="northwest">Northwest</option>
                    <option value="northeast">Northeast</option>
                </select>
            </div>

            <button type="submit">Predict Cost</button>
        </form>

        <div id="result" class="result-box">
            <h3>Estimated Annual Cost</h3>
            <p id="predictionText"></p>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Show loading state (Optional)
            const btn = e.target.querySelector('button');
            btn.innerText = 'Calculating...';
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Data Conversion to match API
            data.age = parseInt(data.age);
            data.bmi = parseFloat(data.bmi);
            data.children = parseInt(data.children);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                // Display Result
                const resultDiv = document.getElementById('result');
                const predictionText = document.getElementById('predictionText');
                
                // Note: using result["Pridiction is"] to match your Python code exactly
                predictionText.innerText = "$" + result["Pridiction is"];
                resultDiv.style.display = 'block';
            } catch (error) {
                alert("Error connecting to the server.");
            } finally {
                btn.innerText = 'Predict Cost';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
