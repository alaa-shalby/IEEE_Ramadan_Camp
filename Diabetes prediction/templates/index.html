<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #219150; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Diabetes Prediction 🩺</h2>
    <form id="predictionForm">
        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Smoking History</label>
            <select name="smoking_history" required>
                <option value="never">Never</option>
                <option value="current">Current</option>
                <option value="former">Former</option>
                <option value="not current">Not Current</option>
                <option value="No Info">No Info</option>
            </select>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" required>
        </div>

        <div class="form-group">
            <label>Hypertension (0: No, 1: Yes)</label>
            <input type="number" name="hypertension" min="0" max="1" required>
        </div>

        <div class="form-group">
            <label>Heart Disease (0: No, 1: Yes)</label>
            <input type="number" name="heart_disease" min="0" max="1" required>
        </div>

        <div class="form-group">
            <label>BMI</label>
            <input type="number" step="0.1" name="bmi" required>
        </div>

        <div class="form-group">
            <label>HbA1c Level</label>
            <input type="number" step="0.1" name="HbA1c_level" required>
        </div>

        <div class="form-group">
            <label>Blood Glucose Level</label>
            <input type="number" name="blood_glucose_level" required>
        </div>

        <button type="submit">Predict Result</button>
    </form>
    <div id="result"></div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        // تحويل القيم الرقمية للتأكد من إرسالها كأرقام وليس نصوص
        const numericFields = ['age', 'hypertension', 'heart_disease', 'bmi', 'HbA1c_level', 'blood_glucose_level'];
        numericFields.forEach(field => {
            if (data[field]) data[field] = parseFloat(data[field]);
        });

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerText = 'Analyzing data... ⏳';
        resultDiv.style.backgroundColor = '#eee';
        resultDiv.style.color = '#333';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                resultDiv.innerText = "Diagnosis: " + result.result;

                resultDiv.style.backgroundColor = result.prediction === 1 ? '#fadbd8' : '#d5f5e3';
                resultDiv.style.color = result.prediction === 1 ? '#a94442' : '#3c763d';
            } else {
                resultDiv.innerText = "Error: " + result.message;
                resultDiv.style.backgroundColor = '#f2dede';
            }
        } catch (error) {
            resultDiv.innerText = "Error: Could not connect to the server.";
            resultDiv.style.backgroundColor = '#f2dede';
        }
    });
</script>

</body>
</html>
